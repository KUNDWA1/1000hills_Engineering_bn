spring.application.name=backend
# 1. Database Connection Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/thousand_hills_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 2. Hibernate/JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Email provider configuration (fill this from your SMTP service provider)
spring.mail.host=smtp.example.com
spring.mail.port=587
spring.mail.username=change-me@example.com
spring.mail.password=change-me-password
spring.mail.from=noreply@1000hills.com
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8
spring.mail.test-connection=false
